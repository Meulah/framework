name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  framework:
    name: Framework / PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.5']

    steps:
      - uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: fileinfo, pdo, pdo_sqlite
          coverage: none
          tools: composer:v2

      - name: Install framework
        run: composer install --no-interaction --prefer-dist

      - name: Validate framework package
        run: |
          composer validate --strict
          composer validate --strict skeleton/composer.json

      - name: Lint framework, starter, and tests
        run: find src skeleton tests -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Run framework tests
        run: composer test

  starter:
    name: Starter / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: fileinfo, pdo, pdo_sqlite
          coverage: none
          tools: composer:v2

      - name: Create clean starter consumer
        shell: bash
        run: php tests/create-starter.php "$RUNNER_TEMP/meulah-app"

      - name: Install starter dependencies
        shell: bash
        working-directory: ${{ runner.temp }}/meulah-app
        run: composer install --no-interaction --prefer-dist

      - name: Validate starter package
        shell: bash
        working-directory: ${{ runner.temp }}/meulah-app
        run: composer validate --strict

      - name: Exercise web bootstrap and CLI entry points
        shell: bash
        working-directory: ${{ runner.temp }}/meulah-app
        env:
          DB_DRIVER: sqlite
          DB_PATH: ':memory:'
        run: |
          php public/index.php > response.html
          grep -q 'Your Meulah application is ready.' response.html
          php meulah --help
          php vendor/bin/meulah --help
          php vendor/meulah/framework/bin/meulah --help
          cd database/migrations
          php ../../meulah migrate:status
          php ../../vendor/bin/meulah migrate:status
          php ../../vendor/meulah/framework/bin/meulah migrate:status
          cd ../../app/Controllers
          php ../../meulah --help
          php ../../vendor/bin/meulah --help
          php ../../vendor/meulah/framework/bin/meulah --help

      - name: Verify production dependency install
        shell: bash
        working-directory: ${{ runner.temp }}/meulah-app
        env:
          DB_DRIVER: sqlite
          DB_PATH: ':memory:'
        run: |
          rm -rf vendor
          composer install --no-dev --no-interaction --prefer-dist
          php public/index.php > production-response.html
          grep -q 'Your Meulah application is ready.' production-response.html
          php meulah migrate:status
