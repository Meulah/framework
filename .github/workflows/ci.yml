name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  framework:
    name: Framework / PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.5']

    steps:
      - uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: fileinfo, pdo, pdo_sqlite
          coverage: none
          tools: composer:v2

      - name: Install framework
        run: composer install --no-interaction --prefer-dist

      - name: Validate framework package
        run: composer validate --strict

      - name: Lint framework and tests
        run: find src tests -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Run framework tests
        run: composer test
